name: Windows Release Zip

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-zip:
    runs-on: windows-latest
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui --skip-sign-check

      - name: Resolve public release flavor
        id: release_meta
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF_NAME

            if ($tag -match '^v1\.') {
              $appFlavor = 'Solo'
            }
            elseif ($tag -match '^v2\.') {
              $appFlavor = 'Lan'
            }
            else {
              throw "Unsupported public release tag '$tag'. Use v1.x.x for BattleshipMaui or v2.x.x for LANBattleshipMAUI."
            }
          }
          else {
            $appFlavor = 'Solo'
          }

          $metadata = dotnet msbuild BattleshipMaui.csproj -nologo "-p:AppFlavor=$appFlavor" -getProperty:PublicAppName -getProperty:Version | ConvertFrom-Json
          $appName = $metadata.Properties.PublicAppName
          $projectVersion = $metadata.Properties.Version
          $expectedTag = "v$projectVersion"

          if ($env:GITHUB_REF -like 'refs/tags/*' -and $env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match the $appName version $expectedTag."
          }

          "appFlavor=$appFlavor" >> $env:GITHUB_OUTPUT
          "appName=$appName" >> $env:GITHUB_OUTPUT
          "projectVersion=$projectVersion" >> $env:GITHUB_OUTPUT
          "expectedTag=$expectedTag" >> $env:GITHUB_OUTPUT

      - name: Publish self-contained release zip
        shell: pwsh
        run: .\scripts\Publish-WindowsZip.ps1 -AppFlavor "${{ steps.release_meta.outputs.appFlavor }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip-${{ steps.release_meta.outputs.appFlavor }}
          path: |
            artifacts/release/*.zip
            artifacts/release/*.sha256
          if-no-files-found: error

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = Get-ChildItem artifacts/release/*.zip, artifacts/release/*.sha256 | Select-Object -ExpandProperty FullName

          gh release view $tag *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          }
          else {
            gh release create $tag $assets --title "${{ steps.release_meta.outputs.appName }} $tag" --generate-notes
          }
